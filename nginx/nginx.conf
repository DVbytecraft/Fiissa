# Zones de rate limiting — DOIT être dans le contexte http, avant les blocs server
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:10000;
    keepalive 16;
}

server_tokens off;

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    # IMPORTANT : adapter server_name à votre domaine réel avant déploiement
    # Exemple fiissa.com : server_name fiissa.com www.fiissa.com;
    # Exemple smartcheckout.africa : server_name smartcheckout.africa www.smartcheckout.africa;
    server_name fiissa.com www.fiissa.com;

    # Certificats Let's Encrypt gérés par Certbot
    ssl_certificate /etc/letsencrypt/live/fiissa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiissa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Logs
    access_log /var/log/nginx/smartcheckout.access.log;
    error_log /var/log/nginx/smartcheckout.error.log;

    client_max_body_size 50M;

    # API Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;

        # Rate limiting API (burst=20 pour absorber les pics, nodelay=réponse immédiate)
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }

    # Fichiers statiques média
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket pour Next.js HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache assets Next.js
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Routes auth avec rate limiting plus strict
    location ~ ^/api/v1/auth/(register|login|staff/login) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
    }

    # Service Worker
    location /sw.js {
        proxy_pass http://frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
