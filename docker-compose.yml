services:
  db:
    image: postgres:16-alpine
    container_name: sc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartcheckout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcheckout_dev}
      POSTGRES_DB: ${POSTGRES_DB:-smartcheckout}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartcheckout}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sc_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smartcheckout}:${POSTGRES_PASSWORD:-smartcheckout_dev}@db:5432/${POSTGRES_DB:-smartcheckout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smartcheckout}:${POSTGRES_PASSWORD:-smartcheckout_dev}@db:5432/${POSTGRES_DB:-smartcheckout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc_beat
    command: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smartcheckout}:${POSTGRES_PASSWORD:-smartcheckout_dev}@db:5432/${POSTGRES_DB:-smartcheckout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
    depends_on:
      - worker
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sc_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: sc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  media_files:
